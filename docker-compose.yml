version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: file-conversion-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/uploads:/app/app/uploads
      - ./backend/app/outputs:/app/app/outputs
      - ./backend/app/temp:/app/app/temp
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:///./backend/app/db/app.db
      - REDIS_ENABLED=false
      - CELERY_ENABLED=false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: file-conversion-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
